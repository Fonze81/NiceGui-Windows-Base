[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nicegui-hello-world"
version = "0.1.0"
description = "A Hello World template for NiceGUI projects."
readme = "README.md"
requires-python = ">=3.13,<3.14"
license = { file = "LICENSE" }
authors = [
    { name = "NiceGUI Hello World contributors" }
]
dependencies = [
    "nicegui",
    "pywebview"
]

[project.optional-dependencies]
packaging = [
    "pyinstaller"
]

[project.scripts]
nicegui-hello-world = "nicegui_hello_world.app:main"

[tool.setuptools.packages.find]
where = ["src"]
