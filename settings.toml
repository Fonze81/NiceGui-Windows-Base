# Persistent development settings for NiceGui Windows Base.
#
# This file represents the runtime settings.toml used from the repository root
# during normal Python execution. The bundled default template lives at
# src/desktop_app/settings.toml and is used when this persistent file is missing.

[app]
name = "NiceGui Windows Base"
version = "0.6.1"
language = "en-US"
first_run = true

[app.window]
x = -6
y = -6
width = 1453
height = 865
maximized = false
fullscreen = false
monitor = 0
persist_state = true
storage_key = "nicegui_windows_base_window_state"

[app.ui]
theme = "light"
font_scale = 1.0
dense_mode = false
accent_color = "#2563EB"

[app.log]
level = "INFO"
enable_console = true
buffer_capacity = 500
file_path = "logs/app.log"
rotate_max_bytes = "5 MB"
rotate_backup_count = 3

[app.behavior]
auto_save = true
